# Cloudflare Workers 部署配置
# 使用方式: npx wrangler deploy --config deploy/worker/wrangler.toml
#
# 部署前需要配置以下 binding：
# 1. D1 数据库 - 取消注释并填入你的 database_id
# 2. R2 存储桶 - 取消注释并填入你的 bucket_name
# 3. KV 命名空间 - 如果使用 KV 而非 D1，取消注释并填入 id
# 4. 环境变量 - 在 [vars] 中配置
#
# GitHub Actions 部署时会自动从 Secrets/Variables 生成此文件，
# 无需手动编辑。详见 .github/workflows/deploy-worker.yml

name = "qianakuma-imgbed"
main = "index.js"
compatibility_date = "2024-08-21"
# 让 Worker 对自身 zone 的 fetch() 走公网入口，不要直连 origin。
compatibility_flags = ["global_fetch_strictly_public"]

# 仅绑定图床子域名，不影响 blog.qianakuma.xyz。
routes = [
  { pattern = "img.qianakuma.xyz", custom_domain = true }
]

# 静态资源（前端文件）
[assets]
directory = "../../frontend-dist"
binding = "ASSETS"
not_found_handling = "single-page-application"

[vars]
R2PublicUrl = "https://img.qianakuma.xyz/file"
USER_CONFIG = '{"siteTitle":"恶魔茜图床","ownerName":"QianAkuma ImgBed","logoLink":"https://github.com/liaojunhao13/qianakuma-imgbed","disableFooter":true,"defaultUploadChannel":"cfr2","defaultChannelName":"R2_env","urlPrefix":"https://img.qianakuma.xyz/file/"}'

[[d1_databases]]
binding = "img_d1"
database_name = "qianakuma-imgbed-db"
database_id = "8e7d1e0f-2b84-43bb-986d-55b2e0d5cfcd"

[[r2_buckets]]
binding = "img_r2"
bucket_name = "qianakuma-imgbed-r2"

